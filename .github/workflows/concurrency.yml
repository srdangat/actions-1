# concurrency demo:
# deploy job takes 5–10 minutes
# new push triggers another workflow

# without concurrency → multiple deployments run together (bad)
# with concurrency → only one runs at a time

# 1. workflow A starts deploy
# 2. workflow B triggered while A is running
# 3. cancel-in-progress = true → A stops, B runs
#    cancel-in-progress = false → B waits in queue

# group = connects related workflows
# result: safe deployments, no conflicts

# concurrency = traffic police for workflows so they don’t crash into each other

# Interview answer:
# Concurrency in GitHub Actions prevents multiple workflow runs from executing at the same time for the same group.
# In CI/CD pipelines, if a new commit is pushed during an active deployment, it can cause conflicts or inconsistent states.
# Using concurrency, we either cancel the running job or queue the new one.
# This ensures only one deployment happens at a time, making releases safe and predictable.



name: Concurrency Demo

on:
  workflow_dispatch:   

env:
   CONTAINER_REGISTRY: docker.io
   IMAGE_NAME: nginx

jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
        - name: Docekr build
          run: echo docker build -t $CONTAINER_REGISTRY/${{ vars.DOCKER_USERNAME }}/$IMAGE_NAME:latest

        - name: Docker Login
          run: echo docker login --username=${{ vars.DOCKER_USERNAME }} --password=${{ secrets.DOCKER_PASSWORD }}

        - name: Docker Publish
          run: echo docker push $CONTAINER_REGISTRY/${{ vars.DOCKER_USERNAME }}

    deploy:
        needs: [docker]
        concurrency:
          group: prod-deployment
          cancel-in-progress: false
        runs-on: ubuntu-latest
        steps:
        - name: Docker run
          run: |
           echo docker run -d -p 8080:80 $CONTAINER_REGISTRY/${{ vars.DOCKER_USERNAME }}/$IMAGE_NAME:latest
           sleep 300s